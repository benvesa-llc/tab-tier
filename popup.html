<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>__MSG_extName__</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="wrap">
      <!-- Header -->
      <div class="header">
        <span class="logo">Tab Tier</span>
        <div class="header-actions">
          <button id="settingsBtn" class="icon-btn" title="__MSG_settingsBtn__">⚙️</button>
        </div>
      </div>

      <!-- Search -->
      <div class="search-bar">
        <input
          id="searchInput"
          type="text"
          placeholder="__MSG_searchPlaceholder__"
          autocomplete="off"
        />
      </div>

      <!-- Tier Summary -->
      <div id="summary" class="summary"></div>

      <!-- Sort Bar -->
      <div class="sort-bar">
        <span class="sort-label">__MSG_sortLabel__</span>
        <button class="sort-btn active" data-sort="tierDomain">__MSG_sortTierDomain__</button>
        <button class="sort-btn" data-sort="tierTitle">__MSG_sortTierTitle__</button>
        <button class="sort-btn" data-sort="tierUrl">__MSG_sortTierUrl__</button>
        <button
          id="applyTabSortBtn"
          class="sort-apply-btn"
          title="__MSG_applyToTabsTitle__"
        >
          ↕ __MSG_applyToTabs__
        </button>
      </div>

      <!-- Main Content -->
      <div id="content" class="content"></div>

      <!-- Footer -->
      <div class="footer">
        <button
          id="clearArchiveBtn"
          class="btn-danger"
          title="__MSG_clearArchiveBtnTitle__"
        >
          __MSG_clearArchiveBtn__
        </button>
        <button id="tabManagerBtn" class="btn-secondary">__MSG_tabManagementBtn__</button>
        <button id="settingsBtn2" class="btn-secondary">__MSG_settingsBtn__</button>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
