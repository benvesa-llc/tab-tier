<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tab Lifecycle Manager</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="wrap">
      <!-- Header -->
      <div class="header">
        <span class="logo">Tab Tier</span>
        <div class="header-actions">
          <button id="settingsBtn" class="icon-btn" title="Ayarlar">⚙️</button>
        </div>
      </div>

      <!-- Search -->
      <div class="search-bar">
        <input
          id="searchInput"
          type="text"
          placeholder="🔍 Tab ara (başlık, domain, url)..."
          autocomplete="off"
        />
      </div>

      <!-- Tier Summary -->
      <div id="summary" class="summary"></div>

      <!-- Sort Bar -->
      <div class="sort-bar">
        <span class="sort-label">Sırala:</span>
        <button class="sort-btn active" data-sort="tierAlpha">
          Tier + A-Z
        </button>
        <button class="sort-btn" data-sort="domain">Domain A-Z</button>
        <button class="sort-btn" data-sort="url">URL A-Z</button>
        <button
          id="applyTabSortBtn"
          class="sort-apply-btn"
          title="Seçili sırayı Edge tab bar'a uygula"
        >
          ↕ Uygula
        </button>
      </div>

      <!-- Main Content (Tier 3 + Tier 4 tabs, or search results) -->
      <div id="content" class="content"></div>

      <!-- Footer -->
      <div class="footer">
        <button
          id="clearArchiveBtn"
          class="btn-danger"
          title="Tier 4 arşivini temizle"
        >
          🗑 Arşivi Temizle
        </button>
        <button id="settingsBtn2" class="btn-secondary">⚙️ Ayarlar</button>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
